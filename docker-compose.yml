services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: i2i-oracle-xe
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: i2i_app
      APP_USER_PASSWORD: i2i_pass
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - i2i-net

  backend:
    build: ./backend
    container_name: i2i-backend
    depends_on:
      oracle-xe:
        condition: service_healthy
    environment:
      ORACLE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      ORACLE_USER: i2i_app
      ORACLE_PASSWORD: i2i_pass
    ports:
      - "8081:8080"
    networks:
      - i2i-net

volumes:
  oracle-data:

networks:
  i2i-net:
    driver: bridge
